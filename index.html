<!DOCTYPE html>
<head>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <title>ROCK PAPER SCISSORS</title>
</head>
<body>
  <div class="header">
    <h1>ROCK PAPER SCISSORS GAME</h1>
    <p>Rules: first to five (5) points win!</p>
    <div id="round-number">Round # </div>
  </div>
  <div class="play-area">
    <div class="side">
      <p>PLAYER</p>
      <p id="player-score">Score: 0</p>
      <p id="player-choice"></p>
    </div>
    <div class="center">
      <p>VERSUS</p>
      <div id="result"></div>
      <div id="winner"></div>
    </div>
    <div class="side">
      <p>COMPUTER</p>
      <p id="computer-score">Score: 0</p>
      <p id="computer-choice"></p>
    </div>
  </div>
  <div class="choices">
    <div>
      <p>✊</p>
      <button type="button" value="ROCK">ROCK</button>
    </div>
    <div>
      <p>🖐️</p>
      <button type="button" value="PAPER">PAPER</button>
    </div>
    <div>
      <p>✌️</p>
      <button type="button" value="SCISSORS">SCISSORS</button>
    </div>
  </div>
  <footer>
    <p>Made by John David Soto</p>
  </footer>
</body>
